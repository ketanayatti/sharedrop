name: Android CI/CD

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK Platform 36
        run: sdkmanager "platforms;android-36"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build Android APK
        run: ./gradlew :composeApp:assembleDebug --no-daemon
        env:

          COMPOSE_HOT_RELOAD_ENABLED: false

      - name: Run Android unit tests
        run: ./gradlew :composeApp:testDebugUnitTest --no-daemon
        env:
          COMPOSE_HOT_RELOAD_ENABLED: false

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sharedrop-apk
        
          path: composeApp/build/outputs/apk/debug/composeApp-debug.apk
          retention-days: 7

  release:
    needs: ci
    if: github.ref == 'refs/heads/feature/add-cicd-pipeline' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK from CI job
        uses: actions/download-artifact@v4
        with:
          name: sharedrop-apk
          path: apk/

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "Auto-generated APK from latest main branch"
          draft: false
          prerelease: false
          generate_release_notes: false
          
          make_latest: true
          files: apk/composeApp-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}