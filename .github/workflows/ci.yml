name: Production CI/CD Pipeline

on:
  push:
    branches: [main, dev, feature/**]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 17

jobs:

# ---------------------------
# 1. CI (FAIL FAST)
# ---------------------------
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Lint + Unit Tests
        run: ./gradlew lint testDebugUnitTest --no-daemon

# ---------------------------
# 2. BUILD (PARALLEL)
# ---------------------------
  build-android:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build APK (Release)
        run: ./gradlew :composeApp:assembleRelease --no-daemon

      - name: Rename APK
        run: |
          APK=$(find composeApp/build/outputs -name "*release*.apk" | head -n 1)
          mv "$APK" sharedrop.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: sharedrop.apk

  build-desktop:
    runs-on: macos-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build Desktop
        run: ./gradlew packageDistributionForCurrentOS --no-daemon

      - name: Normalize Desktop Artifact
        run: |
          FILE=$(find . \( -name "*.dmg" -o -name "*.exe" -o -name "*.deb" \) | head -n 1)
          EXT="${FILE##*.}"
          cp "$FILE" "sharedrop.$EXT"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-bin
          path: sharedrop.*

# ---------------------------
# 3. VALIDATION (STRICT)
# ---------------------------
  validate:
    runs-on: ubuntu-latest
    needs: [build-android, build-desktop]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: android/

      - uses: actions/download-artifact@v4
        with:
          name: desktop-bin
          path: desktop/

      - name: Validate APK Exists
        run: test -f android/sharedrop.apk

      - name: Validate APK Integrity
        run: unzip -t android/sharedrop.apk

      - name: Validate Manifest
        run: unzip -l android/sharedrop.apk | grep AndroidManifest.xml

      - name: Validate Desktop Artifact
        run: ls desktop/sharedrop.*

# ---------------------------
# 4. RUNTIME TEST (ONLY MAIN)
# ---------------------------
  runtime-test:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: android/

      - name: Emulator Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            adb wait-for-device
            adb install android/sharedrop.apk
            adb shell monkey -p org.nitish.project.sharedrop -c android.intent.category.LAUNCHER 1

# ---------------------------
# 5. RELEASE (STRICT ORDER)
# ---------------------------
  release:
    runs-on: ubuntu-latest
    needs: [validate, runtime-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: android/

      - uses: actions/download-artifact@v4
        with:
          name: desktop-bin
          path: desktop/

      - name: Generate Version
        id: version
        run: echo "VERSION=v$(date +'%Y.%m.%d')-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          files: |
            android/sharedrop.apk
            desktop/sharedrop.*