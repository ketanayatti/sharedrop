name: Optimized CI/CD Pipeline

on:
  push:
    branches: [main, dev, feature/**]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 17

jobs:

# ---------------------------
# FAST CI
# ---------------------------
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - run: ./gradlew lint testDebugUnitTest --parallel

# ---------------------------
# ANDROID BUILD
# ---------------------------
  android-build:
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - run: ./gradlew :composeApp:assembleDebug --stacktrace

      - name: Normalize APK
        run: |
          APK=$(find composeApp/build/outputs/apk/debug -name "*.apk" | head -n 1)
          mv "$APK" sharedrop.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: sharedrop.apk

# ---------------------------
# DESKTOP BUILD
# ---------------------------
  desktop-build:
    runs-on: macos-latest
    needs: lint-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - run: ./gradlew packageDistributionForCurrentOS --stacktrace

      - name: Normalize Desktop
        run: |
          FILE=$(find . -name "*.dmg" -o -name "*.exe" -o -name "*.deb" | head -n 1)
          EXT="${FILE##*.}"
          cp "$FILE" "sharedrop.$EXT"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop
          path: sharedrop.*

# ---------------------------
# HEALTH CHECK
# ---------------------------
  health-check:
    runs-on: ubuntu-latest
    needs: [android-build, desktop-build]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android
          path: android/

      - uses: actions/download-artifact@v4
        with:
          name: desktop
          path: desktop/

      - run: test -f android/sharedrop.apk
      - run: unzip -t android/sharedrop.apk
      - run: unzip -l android/sharedrop.apk | grep AndroidManifest.xml
      - run: test "$(find desktop -name 'sharedrop.*')"

# ---------------------------
# RELEASE
# ---------------------------
  release:
    runs-on: ubuntu-latest
    needs: health-check
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android
          path: android/

      - uses: actions/download-artifact@v4
        with:
          name: desktop
          path: desktop/

      - id: version
        run: echo "VERSION=v$(date +'%Y.%m.%d')-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          files: |
            android/sharedrop.apk
            desktop/sharedrop.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ---------------------------
# EMULATOR (NON-BLOCKING)
# ---------------------------
  emulator-test:
    runs-on: ubuntu-latest
    needs: health-check
    if: github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android
          path: android/

      - name: Run Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            adb wait-for-device

            timeout 300 bash -c '
              until adb shell getprop sys.boot_completed | grep -m 1 "1"; do
                sleep 5
              done
            '

            adb install android/sharedrop.apk
            adb shell monkey -p org.nitish.project.sharedrop -c android.intent.category.LAUNCHER 1